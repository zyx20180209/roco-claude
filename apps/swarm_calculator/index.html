<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虫群伤害计算器</title>
<style>
:root {
  --bg: #f3f4f8;
  --card: #fff;
  --border: #e2e5ec;
  --primary: #6366f1;
  --primary-light: #eef2ff;
  --danger: #ef4444;
  --success: #10b981;
  --warn: #f59e0b;
  --text: #1f2937;
  --muted: #6b7280;
  --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 16px; font-size: 14px; }
.container { max-width: 960px; margin: 0 auto; }
h1 { font-size: 1.3rem; margin-bottom: 4px; color: var(--text); text-align: center; }
.subtitle { color: var(--muted); font-size: 0.85rem; text-align: center; margin-bottom: 16px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
.card-title { font-weight: 600; color: var(--primary); font-size: 0.85rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }

/* 攻击者 pills */
.attacker-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.pill { flex: 1; min-width: 120px; background: #fff; border: 2px solid var(--border); border-radius: 8px; padding: 10px; cursor: pointer; transition: all 0.15s; text-align: center; }
.pill:hover { border-color: var(--primary); }
.pill.active { background: var(--primary-light); border-color: var(--primary); }
.pill .name { font-weight: 600; font-size: 0.9rem; }
.pill .stat { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

/* 奉献输入 */
.dedication-row { display: flex; gap: 12px; align-items: stretch; }
.field-large { flex: 1; }
.field-large label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 4px; }
.field-large input[type=number] { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; font-weight: 600; text-align: center; }
.field-large input:focus { outline: none; border-color: var(--primary); }
.field-hint { font-size: 0.7rem; color: var(--muted); margin-top: 3px; line-height: 1.3; }

/* Tabs */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.tab { padding: 8px 14px; cursor: pointer; border: none; background: transparent; font-size: 0.85rem; color: var(--muted); border-bottom: 2px solid transparent; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Form */
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
.row label { font-size: 0.78rem; color: var(--muted); }
input[type=text], input[type=number], select { background: #fff; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; font-size: 0.85rem; }
input:focus, select:focus { outline: none; border-color: var(--primary); }
button { background: var(--primary); color: #fff; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 0.82rem; }
button:hover { opacity: 0.9; }
button.secondary { background: #fff; color: var(--text); border: 1px solid var(--border); }
button.secondary:hover { background: var(--primary-light); }
button.danger { background: var(--danger); }

/* Autocomplete */
.suggest-wrap { position: relative; flex: 1; }
.suggest-wrap input { width: 100%; }
.suggest { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--border); border-radius: 4px; max-height: 200px; overflow-y: auto; z-index: 10; display: none; box-shadow: var(--shadow); }
.suggest.open { display: block; }
.suggest-item { padding: 5px 10px; cursor: pointer; font-size: 0.85rem; }
.suggest-item:hover, .suggest-item.active { background: var(--primary-light); }

/* 结果 */
.result { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border-radius: 10px; padding: 16px; margin-top: 12px; }
.result-name { font-size: 0.9rem; opacity: 0.9; margin-bottom: 6px; }
.result-damage { font-size: 2.2rem; font-weight: 700; line-height: 1; }
.result-pct { font-size: 1rem; margin-top: 4px; opacity: 0.95; }
.result-detail { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); }
.detail-item { font-size: 0.78rem; opacity: 0.9; }
.detail-item .label { display: block; opacity: 0.7; font-size: 0.7rem; }
.detail-item .val { font-weight: 600; font-size: 0.88rem; }
.verdict { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; background: rgba(255,255,255,0.15); }
.verdict.kill { background: rgba(16,185,129,0.5); }
.verdict.nokill { background: rgba(239,68,68,0.4); }

/* 队伍表格 */
.team-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.team-table th { background: var(--primary-light); padding: 6px 10px; text-align: left; font-weight: 600; font-size: 0.78rem; color: var(--primary); }
.team-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
.team-table tr.empty td { color: var(--muted); font-style: italic; }
.team-table tr.kill td { background: rgba(16,185,129,0.08); }
.team-table tr.partial td { background: rgba(245,158,11,0.08); }
.team-table .pct-bar { display: inline-block; width: 40px; height: 6px; background: var(--border); border-radius: 3px; vertical-align: middle; margin-left: 4px; overflow: hidden; }
.team-table .pct-bar > span { display: block; height: 100%; background: var(--primary); }

/* 类型徽章 */
.badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.72rem; margin-left: 4px; }
.badge-weak3 { background: rgba(239,68,68,0.2); color: #b91c1c; }
.badge-resist3 { background: rgba(99,102,241,0.15); color: #4f46e5; }
.badge-1x { background: var(--border); color: var(--muted); }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 10px; padding: 18px; max-width: 460px; width: 90%; max-height: 90vh; overflow-y: auto; }
.modal h3 { margin-bottom: 10px; color: var(--primary); }
.modal .row { margin-bottom: 8px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }

/* List */
.list-row { display: flex; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
.list-row:last-child { border-bottom: none; }
.list-row .name { flex: 1; font-weight: 500; }
.list-row .meta { color: var(--muted); font-size: 0.78rem; }

/* 6槽位 grid */
.team-slots { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 10px 0; }
.team-slots > div { display: flex; gap: 4px; align-items: center; }
.team-slots label { font-size: 0.75rem; color: var(--muted); min-width: 30px; }
.team-slots select { flex: 1; }

/* 页面级 tab */
.page-tabs { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 2px solid var(--border); }
.page-tab { padding: 10px 20px; cursor: pointer; border: none; background: transparent; font-size: 0.95rem; color: var(--muted); border-bottom: 3px solid transparent; margin-bottom: -2px; font-weight: 500; border-radius: 0; }
.page-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
.page-panel { display: none; }
.page-panel.active { display: block; }

/* 茎叶图 */
.stem-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.stem-label { min-width: 56px; text-align: right; font-weight: 700; font-size: 0.95rem; color: var(--primary); padding-top: 6px; flex-shrink: 0; }
.stem-divider { width: 2px; background: var(--border); align-self: stretch; flex-shrink: 0; }
.stem-cards { display: flex; flex-wrap: wrap; gap: 6px; }
.pkmn-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 0.8rem; line-height: 1.5; min-width: 110px; position: relative; }
.pkmn-card .card-name { font-weight: 600; color: var(--text); }
.pkmn-card .card-cfg { color: var(--muted); font-size: 0.72rem; }
.pkmn-card .card-tag { display: inline-block; font-size: 0.68rem; padding: 1px 5px; border-radius: 3px; margin-top: 2px; font-weight: 600; }
.tag-one { background: rgba(16,185,129,0.15); color: #065f46; }
.tag-two { background: rgba(245,158,11,0.15); color: #92400e; }
.pkmn-card .card-del { position: absolute; top: 3px; right: 4px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.75rem; padding: 0 2px; line-height: 1; }
.pkmn-card .card-del:hover { color: var(--danger); }
.pkmn-card.highlight { background: #fef3c7; border-color: var(--warn); box-shadow: 0 0 0 2px rgba(245,158,11,0.3); }
.stem-row.highlight .stem-label { color: var(--warn); transform: scale(1.15); }
.stem-row.highlight .stem-divider { background: var(--warn); width: 3px; }
</style>
</head>
<body>
<div class="container">
<h1>虫群伤害计算器</h1>
<div class="subtitle">虫系奉献体系 · 三种攻击者预设 · 多目标管理</div>

<!-- 页面级 tab -->
<div class="page-tabs">
  <button class="page-tab active" data-page="calc">伤害计算器</button>
  <button class="page-tab" data-page="thresh">阈值速查表</button>
</div>

<!-- ============ 计算器页面 ============ -->
<div class="page-panel active" id="page-calc">

<!-- 攻击者 -->
<div class="card">
  <div class="card-title">攻击者</div>
  <div class="attacker-pills" id="attacker-pills"></div>
</div>

<!-- 奉献输入 -->
<div class="card">
  <div class="card-title">奉献层数</div>
  <div class="dedication-row">
    <div class="field-large">
      <label>威力层 (x)</label>
      <input type="number" id="x-input" value="0" min="0" step="1">
      <div class="field-hint">每层 +20 基础威力</div>
    </div>
    <div class="field-large">
      <label>连击层 (y)</label>
      <input type="number" id="y-input" value="0" min="0" step="1">
      <div class="field-hint">每层 +1 连击数</div>
    </div>
    <div class="field-large">
      <label>中毒层 (z)</label>
      <input type="number" id="z-input" value="0" min="0" step="1">
      <div class="field-hint">每次虫群施加 2z 层中毒</div>
    </div>
  </div>
</div>

<!-- 目标 -->
<div class="card">
  <div class="card-title">目标</div>
  <div class="row" style="margin-bottom:10px">
    <label>敌方减伤 %</label>
    <input type="number" id="mit-input" value="0" min="0" max="99" step="1" style="width:70px">
    <span style="font-size:0.78rem;color:var(--muted)">防御技能减伤百分比</span>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="predef">预定义</button>
    <button class="tab" data-tab="manual">手动</button>
    <button class="tab" data-tab="team">队伍</button>
  </div>

  <div class="tab-panel active" id="panel-predef">
    <div class="row">
      <select id="predef-select" style="flex:1"></select>
      <button onclick="openTargetModal()">新建</button>
      <button class="secondary" onclick="editSelectedTarget()">编辑</button>
      <button class="danger" onclick="deleteSelectedTarget()">删除</button>
    </div>
    <div id="predef-empty" style="color:var(--muted);font-size:0.82rem;display:none">还没有预定义目标，点击"新建"添加。</div>
  </div>

  <div class="tab-panel" id="panel-manual">
    <div class="row">
      <label>精灵</label>
      <div class="suggest-wrap">
        <input type="text" id="manual-name" placeholder="输入精灵名">
        <div class="suggest" id="manual-suggest"></div>
      </div>
    </div>
    <div class="row">
      <label>HP个体</label><input type="number" id="manual-hp-iv" value="10" min="0" max="10" style="width:50px">
      <label>物防个体</label><input type="number" id="manual-def-iv" value="10" min="0" max="10" style="width:50px">
      <label>性格</label>
      <select id="manual-nature"><option value="无" selected>无</option><option value="加hp">加HP</option><option value="加def">加防御</option></select>
      <label>物防Buff层</label><input type="number" id="manual-buff" value="0" step="1" style="width:50px">
    </div>
  </div>

  <div class="tab-panel" id="panel-team">
    <div class="row">
      <select id="team-select" style="flex:1"></select>
      <button onclick="openTeamModal()">管理队伍</button>
    </div>
    <div id="team-empty" style="color:var(--muted);font-size:0.82rem;display:none">还没有保存的队伍，点击"管理队伍"创建。</div>
  </div>
</div>

<!-- 结果 -->
<div id="result-area"></div>

</div><!-- /page-calc -->

<!-- ============ 阈值速查表页面 ============ -->
<div class="page-panel" id="page-thresh">
  <div class="card">
    <div class="card-title">添加目标精灵</div>
    <div class="row">
      <div class="suggest-wrap" style="flex:2">
        <input type="text" id="th-name" placeholder="输入精灵名（自动补全）">
        <div class="suggest" id="th-suggest"></div>
      </div>
      <label>HP个体</label><input type="number" id="th-hp-iv" value="10" min="0" max="10" style="width:50px">
      <label>物防个体</label><input type="number" id="th-def-iv" value="10" min="0" max="10" style="width:50px">
      <label>性格</label>
      <select id="th-nature"><option value="无" selected>无</option><option value="加hp">加HP</option><option value="加def">加防御</option></select>
      <label>物防Buff</label><input type="number" id="th-buff" value="0" step="1" style="width:50px">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
        <input type="checkbox" id="th-tworound"> 含两击
      </label>
      <button onclick="addThreshTarget()">添加</button>
    </div>
  </div>

  <div class="card">
    <div class="row" style="margin-bottom:8px">
      <div class="card-title" style="margin:0">奉献阈值图</div>
      <span style="flex:1"></span>
      <label>收割位</label>
      <select id="th-attacker">
        <option value="陨星虫">陨星虫</option>
        <option value="女王蜂5层" selected>女王蜂5层</option>
        <option value="花衣蝶">花衣蝶</option>
      </select>
      <span style="font-size:0.78rem;color:var(--muted);margin-left:8px">共 <span id="th-count">0</span> 只</span>
    </div>
    <div class="row" style="margin-bottom:10px">
      <div class="suggest-wrap" style="flex:1">
        <input type="text" id="th-search" placeholder="🔍 搜索表中精灵（高亮所在档位）">
        <div class="suggest" id="th-search-suggest"></div>
      </div>
      <button class="secondary" onclick="clearThreshSearch()">清除</button>
      <button class="secondary" onclick="exportTargets()">导出</button>
      <label style="cursor:pointer"><button class="secondary" onclick="document.getElementById('import-file').click()">导入</button></label>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importTargets(this)">
      <button class="secondary" onclick="resetToDefault()">恢复默认</button>
    </div>
    <div id="th-stem"></div>
    <div id="th-empty" style="color:var(--muted);font-size:0.85rem;text-align:center;padding:20px;display:none">
      还没有添加目标。输入精灵名后点"添加"。
    </div>
  </div>
</div><!-- /page-thresh -->

<!-- Edit target modal -->
<div class="modal-bg" id="target-modal-bg">
  <div class="modal">
    <h3 id="target-modal-title">新建目标</h3>
    <div class="row">
      <label>精灵</label>
      <div class="suggest-wrap">
        <input type="text" id="t-name" placeholder="输入精灵名">
        <div class="suggest" id="t-suggest"></div>
      </div>
    </div>
    <div class="row">
      <label>HP个体</label><input type="number" id="t-hp-iv" value="10" min="0" max="10" style="width:60px">
      <label>物防个体</label><input type="number" id="t-def-iv" value="10" min="0" max="10" style="width:60px">
    </div>
    <div class="row">
      <label>性格</label>
      <select id="t-nature"><option value="无" selected>无</option><option value="加hp">加HP</option><option value="加def">加防御</option></select>
      <label>物防Buff层</label><input type="number" id="t-buff" value="0" step="1" style="width:60px">
    </div>
    <div class="modal-actions">
      <button class="secondary" onclick="closeModal('target-modal-bg')">取消</button>
      <button onclick="saveTargetFromModal()">保存</button>
    </div>
  </div>
</div>

<!-- Team management modal -->
<div class="modal-bg" id="team-modal-bg">
  <div class="modal" style="max-width:560px">
    <h3>管理队伍</h3>
    <div id="team-list"></div>
    <button onclick="newTeam()" style="margin-top:8px">+ 新建队伍</button>
    <div id="team-edit" style="display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <div class="row">
        <label>队伍名</label>
        <input type="text" id="team-name-input" style="flex:1">
      </div>
      <div class="team-slots" id="team-slot-grid"></div>
      <div class="modal-actions">
        <button class="secondary" onclick="cancelTeamEdit()">取消</button>
        <button onclick="saveTeamFromModal()">保存</button>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:14px">
      <button class="secondary" onclick="closeModal('team-modal-bg')">关闭</button>
    </div>
  </div>
</div>

</div>
<script>
// ────────── 常量 & 状态 ──────────
const NATURE_MULT = { "无": 1.0, "加hp": 1.2, "加def": 1.2 };

function calcStat(base, iv, nature) {
  const mult = nature === "加def" ? 1.2 : 1.0;
  return Math.round((Math.round(1.1 * (base + 3 * iv)) + 10) * mult) + 50;
}
function calcHp(base, iv, nature) {
  const mult = nature === "加hp" ? 1.2 : 1.0;
  return Math.round((Math.round(1.7 * (base + 3 * iv)) + 70) * mult) + 100;
}
const ATTACKERS = {
  "花衣蝶":   { base: 67, iv: 0,  nature: "无", buffMult: 1.0  },
  "陨星虫":   { base: 78, iv: 10, nature: "无", buffMult: 1.0  },
  "女王蜂5层": { base: 54, iv: 10, nature: "无", buffMult: 1.75 },
};

let POKEMON = [], POKEMON_MAP = {};
let DEFAULT_TARGETS = [];
let TYPE_MATRIX = {};
let targets = [], teams = [];
let editingTargetId = null;
let editingTeamId = null;
let state = {
  attacker: "陨星虫",
  x: 0, y: 0, z: 0, mit: 0,
  targetMode: "predef",
  selectedTargetId: null,
  selectedTeamId: null,
  manualTarget: { name: "", hpIv: 10, defIv: 10, nature: "无", buffLayers: 0 },
};

// ────────── 数据加载 ──────────
async function loadData() {
  const [pmRes, tcRes, dtRes] = await Promise.all([
    fetch("../../data/raw/pokemon.json"),
    fetch("../../data/raw/type_chart.json"),
    fetch("default_targets.json"),
  ]);
  const pmRaw = await pmRes.json();
  const tcRaw = await tcRes.json();
  DEFAULT_TARGETS = await dtRes.json();
  POKEMON = pmRaw.map(p => ({
    name: p.display_name,
    attrs: p.attributes_list,
    hp: parseInt(p.stats.hp),
    attack: parseInt(p.stats.attack),
    defense: parseInt(p.stats.defense),
  }));
  POKEMON_MAP = Object.fromEntries(POKEMON.map(p => [p.name, p]));
  TYPE_MATRIX = tcRaw.multiplier_matrix;
}

function loadStorage() {
  try { targets = JSON.parse(localStorage.getItem("roco_swarm_targets") || "[]"); } catch { targets = []; }
  if (!targets.length) targets = DEFAULT_TARGETS.map(t => ({ ...t }));
  try { teams   = JSON.parse(localStorage.getItem("roco_swarm_teams") || "[]"); } catch { teams = []; }
  try {
    const ui = JSON.parse(localStorage.getItem("roco_swarm_ui") || "null");
    if (ui) state = { ...state, ...ui, manualTarget: { ...state.manualTarget, ...(ui.manualTarget||{}) } };
  } catch {}
}

let saveUITimer = null;
function saveUI() {
  clearTimeout(saveUITimer);
  saveUITimer = setTimeout(() => {
    localStorage.setItem("roco_swarm_ui", JSON.stringify(state));
  }, 300);
}

function saveTargets() { localStorage.setItem("roco_swarm_targets", JSON.stringify(targets)); }
function saveTeams() { localStorage.setItem("roco_swarm_teams", JSON.stringify(teams)); }
function newId(prefix) { return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,5)}`; }

// ────────── 伤害计算 ──────────
function calcStat(base, iv, nature) {
  return Math.round((Math.round(1.1 * (base + 3 * iv)) + 10) * NATURE_MULT[nature]) + 50;
}
function calcHp(base, iv, nature) {
  return Math.round((Math.round(1.7 * (base + 3 * iv)) + 70) * NATURE_MULT[nature]) + 100;
}

// PVP 双属性：双弱 3x，双抗 1/4，弱抗抵消 1x，单一关系直接乘
function getTypeMult(atkType, defAttrs) {
  const vals = defAttrs.map(t => TYPE_MATRIX[atkType]?.[t] ?? 1);
  if (vals.length === 1) return vals[0];
  const [a, b] = vals;
  if (a === 2 && b === 2) return 3;
  if (a === 0.5 && b === 0.5) return 0.25;
  return a * b;
}

function attackerStat(name) {
  const a = ATTACKERS[name];
  return Math.round(calcStat(a.base, a.iv, a.nature) * a.buffMult);
}

function resolveTarget(spec) {
  const p = POKEMON_MAP[spec.name];
  if (!p) return null;
  const hpMax = calcHp(p.hp, spec.hpIv ?? 10, spec.nature ?? "无");
  const defStat = Math.round(
    calcStat(p.defense, spec.defIv ?? 10, spec.nature ?? "无") * (1 + (spec.buffLayers ?? 0) * 0.1)
  );
  return { name: spec.name, attrs: p.attrs, hpMax, defStat };
}

function computeDamage(attackerName, x, y, z, mit, target) {
  const atk = attackerStat(attackerName);
  const typeMult = getTypeMult("虫", target.attrs);
  const effPower = (20 + x*20) * 1.25 * typeMult;
  const hits = 1 + y;
  const mitMult = 1 - (mit || 0) / 100;
  const damage = Math.trunc(Math.round(atk * hits * effPower * mitMult * 37 / 41) / target.defStat);

  const poisonLayers = 2 * z;
  const poisonImmune = target.attrs.includes("毒");
  const poisonTypeMult = poisonImmune ? 0 : getTypeMult("毒", target.attrs);
  const poisonPerTurn = Math.floor(target.hpMax * 0.03 * poisonTypeMult) * poisonLayers;

  const remaining = target.hpMax - damage;
  let killAtTurn = null, killType = null;
  if (damage >= target.hpMax) {
    killAtTurn = 1; killType = "direct";
  } else if (poisonPerTurn > 0 && damage + poisonPerTurn >= target.hpMax) {
    killAtTurn = 1; killType = "direct+poison";
  } else if (poisonPerTurn > 0 && remaining > 0) {
    // 直伤和第1回合中毒同回合，remaining已扣除直伤，再看需要几回合中毒
    killAtTurn = Math.ceil(remaining / poisonPerTurn); killType = "poison";
  }

  return {
    damage, hpMax: target.hpMax,
    pct: 100 * damage / target.hpMax,
    poisonLayers, poisonPerTurn, killAtTurn, killType,
    atkStat: atk, defStat: target.defStat, typeMult, effPower, hits, mitMult,
  };
}

function renderResult() {
  const area = document.getElementById("result-area");
  const x = state.x, y = state.y, z = state.z;

  if (state.targetMode === "team") {
    const team = teams.find(t => t.id === state.selectedTeamId);
    if (!team) { area.innerHTML = ''; return; }
    let html = `<div class="card"><div class="card-title">${team.name} · 6 只精灵伤害</div>
      <table class="team-table"><thead><tr>
        <th>精灵</th><th>属性</th><th>HP</th><th>克制</th><th>伤害</th><th>%</th><th>结果</th>
      </tr></thead><tbody>`;
    team.targetIds.forEach((tid, idx) => {
      if (!tid) {
        html += `<tr class="empty"><td colspan="7">— 槽位 ${idx+1} 空 —</td></tr>`;
        return;
      }
      const tspec = targets.find(t => t.id === tid);
      if (!tspec) { html += `<tr class="empty"><td colspan="7">— 已删除 —</td></tr>`; return; }
      const tg = resolveTarget(tspec);
      if (!tg) { html += `<tr class="empty"><td colspan="7">${tspec.name}（数据缺失）</td></tr>`; return; }
      const r = computeDamage(state.attacker, x, y, z, state.mit, tg);
      const rowClass = r.killAtTurn === 1 ? 'kill' : (r.killAtTurn ? 'partial' : '');
      const verdict = r.killType === 'direct' ? '✅ 直伤斩杀' :
                      r.killType === 'direct+poison' ? '✅ 直伤+毒斩杀' :
                      r.killAtTurn ? `🟡 第${r.killAtTurn}回合末（毒）` : '❌ 无法斩杀';
      html += `<tr class="${rowClass}"><td>${tspec.name}</td><td>${tg.attrs.join('/')}</td>
        <td>${r.hpMax}</td>
        <td>${typeMultBadge(r.typeMult)}</td>
        <td>${r.damage}</td>
        <td>${r.pct.toFixed(0)}%<span class="pct-bar"><span style="width:${Math.min(100,r.pct)}%"></span></span></td>
        <td>${verdict}</td></tr>`;
    });
    html += '</tbody></table></div>';
    area.innerHTML = html;
    return;
  }

  // 单目标
  let spec = null;
  if (state.targetMode === "predef") {
    spec = targets.find(t => t.id === state.selectedTargetId);
  } else if (state.targetMode === "manual") {
    spec = state.manualTarget;
  }
  if (!spec || !spec.name || !POKEMON_MAP[spec.name]) {
    area.innerHTML = '<div class="card" style="text-align:center;color:var(--muted)">请选择或填写有效的目标精灵</div>';
    return;
  }
  const tg = resolveTarget(spec);
  if (!tg) { area.innerHTML = ''; return; }
  const r = computeDamage(state.attacker, x, y, z, state.mit, tg);
  const mitLabel = state.mit > 0 ? `（减伤${state.mit}%后）` : '';
  const verdictClass = r.killAtTurn === 1 ? 'kill' : (r.killAtTurn ? '' : 'nokill');
  const verdictText = r.killType === 'direct' ? `✅ 直伤斩杀${mitLabel}（溢出 ${r.damage - r.hpMax}）` :
                      r.killType === 'direct+poison' ? `✅ 直伤+回合末中毒斩杀${mitLabel}（直伤 ${r.damage}，中毒 ${r.poisonPerTurn}）` :
                      r.killAtTurn ? `🟡 第 ${r.killAtTurn} 回合末中毒斩杀${mitLabel}（直伤 ${r.damage} + ${r.killAtTurn} 次中毒 × ${r.poisonPerTurn}）` :
                                     `❌ 无法斩杀${mitLabel}（剩余 ${r.hpMax - r.damage}）`;
  const poisonPct = r.poisonPerTurn > 0 ? ` + 中毒 ${(r.poisonPerTurn/r.hpMax*100).toFixed(1)}%/回合` : '';
  area.innerHTML = `<div class="result">
    <div class="result-name">${spec.name} · ${tg.attrs.join('/')} · HP ${tg.hpMax}</div>
    <div class="result-damage">${r.damage}</div>
    <div class="result-pct">${r.pct.toFixed(1)}%${poisonPct}${typeMultBadge(r.typeMult)}</div>
    <div class="result-detail">
      <div class="detail-item"><span class="label">攻击力</span><span class="val">${r.atkStat}</span></div>
      <div class="detail-item"><span class="label">防御力</span><span class="val">${r.defStat}</span></div>
      <div class="detail-item"><span class="label">有效威力</span><span class="val">${r.effPower.toFixed(1)}</span></div>
      <div class="detail-item"><span class="label">连击数</span><span class="val">${r.hits}</span></div>
      <div class="detail-item"><span class="label">减伤</span><span class="val">${state.mit}%</span></div>
      <div class="detail-item"><span class="label">中毒层</span><span class="val">${r.poisonLayers}</span></div>
      <div class="detail-item"><span class="label">中毒/回合</span><span class="val">${r.poisonPerTurn} (${(r.poisonPerTurn/r.hpMax*100).toFixed(1)}%)</span></div>
    </div>
    <div class="verdict ${verdictClass}">${verdictText}</div>
  </div>`;
}

function typeMultBadge(m) {
  if (m === 3) return '<span class="badge badge-weak3">×3 双弱</span>';
  if (m > 1.99) return `<span class="badge badge-weak3">×${m}</span>`;
  if (Math.abs(m - 0.25) < 0.01) return '<span class="badge badge-resist3">×1/4 双抗</span>';
  if (m < 1) return `<span class="badge badge-resist3">×${m.toFixed(2)}</span>`;
  return '<span class="badge badge-1x">×1</span>';
}

// ────────── Autocomplete ──────────
function setupAutocomplete(inputId, suggestId, onSelect) {
  const input = document.getElementById(inputId);
  const suggest = document.getElementById(suggestId);
  let activeIdx = -1;
  function close() { suggest.classList.remove("open"); activeIdx = -1; }
  input.addEventListener("input", () => {
    const v = input.value.trim();
    if (!v) { close(); return; }
    const items = POKEMON.filter(p => p.name.includes(v)).slice(0, 8);
    if (!items.length) { close(); return; }
    suggest.innerHTML = items.map((p, i) =>
      `<div class="suggest-item" data-name="${p.name}">${p.name} (${p.attrs.join('/')})</div>`
    ).join("");
    suggest.classList.add("open");
    activeIdx = -1;
    suggest.querySelectorAll(".suggest-item").forEach(el => {
      el.addEventListener("click", () => {
        input.value = el.dataset.name;
        close();
        onSelect(el.dataset.name);
      });
    });
  });
  input.addEventListener("blur", () => setTimeout(close, 150));
  input.addEventListener("keydown", e => {
    const items = suggest.querySelectorAll(".suggest-item");
    if (e.key === "ArrowDown") { activeIdx = Math.min(activeIdx+1, items.length-1); items.forEach((el,i)=>el.classList.toggle("active",i===activeIdx)); e.preventDefault(); }
    else if (e.key === "ArrowUp") { activeIdx = Math.max(activeIdx-1, 0); items.forEach((el,i)=>el.classList.toggle("active",i===activeIdx)); e.preventDefault(); }
    else if (e.key === "Enter" && activeIdx >= 0) { items[activeIdx].click(); e.preventDefault(); }
    else if (e.key === "Escape") close();
  });
}

  document.getElementById("t-buff").value = t ? t.buffLayers : 0;
  document.getElementById("target-modal-bg").classList.add("open");
}
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function saveTargetFromModal() {
  const name = document.getElementById("t-name").value.trim();
  if (!name || !POKEMON_MAP[name]) { alert("请输入有效的精灵名"); return; }
  const data = {
    name,
    hpIv: parseInt(document.getElementById("t-hp-iv").value)||0,
    defIv: parseInt(document.getElementById("t-def-iv").value)||0,
    nature: document.getElementById("t-nature").value,

  openTargetModal(state.selectedTargetId);
}

  if (!confirm("确认删除该目标？相关队伍中的引用也会清空。")) return;
  const id = state.selectedTargetId;
  targets = targets.filter(t => t.id !== id);
  teams.forEach(team => { team.targetIds = team.targetIds.map(tid => tid === id ? null : tid); });
  state.selectedTargetId = targets[0]?.id || null;
  saveTargets(); saveTeams(); saveUI();
  render();
}

// ────────── 阈值表 ──────────
function findMinCombo(atkStat, hpMax, defStat, typeMult, rounds) {
  for (let total = 0; total <= 30; total++) {
    for (let x = 0; x <= total; x++) {
      const y = total - x;
      const ep = (20 + x * 20) * 1.25 * typeMult;
      const d = Math.trunc(Math.round(atkStat * (1 + y) * ep * 37 / 41) / defStat);
      if (d * rounds >= hpMax) return { total, x, y };
    }
  }
  return null;
}

// 茎叶图档位序列：3+3=6, 4+3=7, 4+4=8, 5+4=9, 5+5=10, 6+5=11, 6+6=12...
const MIN_TOTAL = 6; // 3+3 是底线
function stemLevels() {
  const levels = [];
  for (let base = 3; base <= 15; base++) {
    levels.push({ total: base * 2 - 1, x: base, y: base - 1, label: `${base}+${base-1}` });
    levels.push({ total: base * 2,     x: base, y: base,     label: `${base}+${base}` });
  }
  // 移除 3+2=5（base=3 时第一项），从 3+3=6 开始
  return levels.filter(l => l.total >= MIN_TOTAL);
}

let threshSearchName = "";

function renderThreshTable() {
  const stem = document.getElementById("th-stem");
  const empty = document.getElementById("th-empty");
  const count = document.getElementById("th-count");
  const atk = attackerStat(document.getElementById("th-attacker").value);

  count.textContent = targets.length;
  if (!targets.length) {
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
  }

  // 计算每只精灵的一击/两击最小总层数
  const items = targets.map(t => {
    const p = POKEMON_MAP[t.name];
    if (!p) return null;
    const hpMax = calcHp(p.hp, t.hpIv ?? 10, t.nature ?? "无");
    const defStat = Math.round(calcStat(p.defense, t.defIv ?? 10, t.nature ?? "无") * (1 + (t.buffLayers ?? 0) * 0.1));
    const tm = getTypeMult("虫", p.attrs);
    const one = findMinCombo(atk, hpMax, defStat, tm, 1);
    const two = t.twoRound ? findMinCombo(atk, hpMax, defStat, tm, 2) : null;
    const natureLbl = t.nature === "加hp" ? "加HP" : t.nature === "加def" ? "加防" : "无性格";
    const cfg = `HP${t.hpIv ?? 10} 防${t.defIv ?? 10} ${natureLbl}${t.buffLayers ? " 防Buff+"+t.buffLayers : ""}`;
    return { t, cfg, one, two };
  }).filter(Boolean);

  // 按档位分桶；低于 MIN_TOTAL 的塞进 MIN_TOTAL
  const buckets = {};
  items.forEach(item => {
    if (item.one) {
      const k = Math.max(item.one.total, MIN_TOTAL);
      (buckets[k] = buckets[k] || []).push({ ...item, tag: "one" });
    }
    if (item.two && (!item.one || item.two.total < item.one.total)) {
      const k = Math.max(item.two.total, MIN_TOTAL);
      (buckets[k] = buckets[k] || []).push({ ...item, tag: "two" });
    }
  });

  // 必显档位：3+3=6 到 5+5=10
  const REQUIRED_MIN = 6, REQUIRED_MAX = 10;
  const usedTotals = new Set(Object.keys(buckets).map(Number));
  for (let n = REQUIRED_MIN; n <= REQUIRED_MAX; n++) usedTotals.add(n);

  // 找到搜索匹配的档位（最低的一档；如同时有一击和两击，取两击档位，因为它更小）
  const search = threshSearchName.trim();
  const highlightTotals = new Set();
  if (search) {
    items.forEach(item => {
      if (item.t.name === search) {
        if (item.two && (!item.one || item.two.total < item.one.total)) {
          highlightTotals.add(Math.max(item.two.total, MIN_TOTAL));
        }
        if (item.one) {
          highlightTotals.add(Math.max(item.one.total, MIN_TOTAL));
        }
      }
    });
  }

  // 从高到低排序（最下面是 3+3）
  const sortedTotals = Array.from(usedTotals).sort((a, b) => b - a);
  const levels = stemLevels();

  stem.innerHTML = sortedTotals.map(total => {
    const lv = levels.find(l => l.total === total);
    const label = lv ? lv.label : `?+${total}`;
    const bucket = buckets[total] || [];
    const cards = bucket.map(({ t, cfg, tag }) => {
      const isMatch = search && t.name === search;
      return `<div class="pkmn-card ${isMatch ? 'highlight' : ''}">
        <button class="card-del" onclick="deleteThreshTarget('${t.id}')" title="删除">×</button>
        <div class="card-name">${t.name}</div>
        <div class="card-cfg">${cfg}</div>
        <span class="card-tag ${tag === 'one' ? 'tag-one' : 'tag-two'}">${tag === 'one' ? '一击必杀' : '两击击杀'}</span>
      </div>`;
    }).join("");
    const rowHL = highlightTotals.has(total) ? 'highlight' : '';
    return `<div class="stem-row ${rowHL}">
      <div class="stem-label">${label}</div>
      <div class="stem-divider"></div>
      <div class="stem-cards">${cards}</div>
    </div>`;
  }).join("");
}

function addThreshTarget() {
  const name = document.getElementById("th-name").value.trim();
  if (!name || !POKEMON_MAP[name]) { alert("请输入有效的精灵名"); return; }
  targets.push({
    id: newId("tgt"),
    name,
    hpIv: parseInt(document.getElementById("th-hp-iv").value) || 0,
    defIv: parseInt(document.getElementById("th-def-iv").value) || 0,
    nature: document.getElementById("th-nature").value,
    buffLayers: parseInt(document.getElementById("th-buff").value) || 0,
    twoRound: document.getElementById("th-tworound").checked,
  });
  saveTargets();
  document.getElementById("th-name").value = "";
  renderThreshTable();
  renderPredefSelect();
}

function deleteThreshTarget(id) {
  targets = targets.filter(t => t.id !== id);
  teams.forEach(team => { team.targetIds = team.targetIds.map(tid => tid === id ? null : tid); });
  saveTargets(); saveTeams();
  renderThreshTable();
  renderPredefSelect();
}

function wireThreshEvents() {
  setupAutocomplete("th-name", "th-suggest", name => {
    document.getElementById("th-name").value = name;
  });
  document.getElementById("th-attacker").addEventListener("change", renderThreshTable);

  // 搜索框：仅在已添加的目标中匹配
  const searchInput = document.getElementById("th-search");
  const searchSuggest = document.getElementById("th-search-suggest");
  searchInput.addEventListener("input", () => {
    const v = searchInput.value.trim();
    threshSearchName = "";
    if (!v) { searchSuggest.classList.remove("open"); renderThreshTable(); return; }
    const items = targets.filter(t => t.name.includes(v)).slice(0, 8);
    if (!items.length) { searchSuggest.classList.remove("open"); renderThreshTable(); return; }
    searchSuggest.innerHTML = items.map(t =>
      `<div class="suggest-item" data-name="${t.name}">${t.name}</div>`
    ).join("");
    searchSuggest.classList.add("open");
    searchSuggest.querySelectorAll(".suggest-item").forEach(el => {
      el.addEventListener("click", () => {
        searchInput.value = el.dataset.name;
        threshSearchName = el.dataset.name;
        searchSuggest.classList.remove("open");
        renderThreshTable();
      });
    });
    // 输入时如果完全匹配某个名称，直接高亮
    const exact = targets.find(t => t.name === v);
    if (exact) { threshSearchName = exact.name; renderThreshTable(); }
  });
  searchInput.addEventListener("blur", () => setTimeout(() => searchSuggest.classList.remove("open"), 150));
}

function clearThreshSearch() {
  document.getElementById("th-search").value = "";
  threshSearchName = "";
  renderThreshTable();
}

function exportTargets() {
  const blob = new Blob([JSON.stringify(targets, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "swarm_targets.json";
  a.click();
}

function importTargets(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error();
      targets = data;
      saveTargets();
      renderThreshTable();
      renderPredefSelect();
    } catch { alert("JSON 格式错误"); }
    input.value = "";
  };
  reader.readAsText(file);
}

function resetToDefault() {
  if (!confirm("恢复默认数据将覆盖当前所有精灵，确认？")) return;
  targets = DEFAULT_TARGETS.map(t => ({ ...t }));
  saveTargets();
  renderThreshTable();
  renderPredefSelect();
}

// ────────── 启动 ──────────
(async function main() {
  try {
    await loadData();
  } catch (e) {
    document.body.innerHTML = '<div style="text-align:center;padding:30px;color:var(--danger)">数据加载失败。需要通过 HTTP 服务访问（运行 ./apps/serve.sh）</div>';
    return;
  }
  loadStorage();
  wireEvents();
  wirePageTabs();
  wireThreshEvents();
  renderAttackerPills();
  render();
})();
</script>
