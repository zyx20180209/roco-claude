<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对战回放记录</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 12px; font-size: 14px; }
h1 { text-align: center; color: #a0c4ff; margin-bottom: 12px; font-size: 1.1rem; }
h2 { font-size: 0.9rem; color: #90caf9; margin-bottom: 8px; }
section { background: #16213e; border-radius: 8px; padding: 10px; margin-bottom: 10px; }

/* 队伍面板 */
.team-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.pokemon-card { background: #0f3460; border-radius: 6px; padding: 6px; font-size: 0.78rem; }
.pokemon-card.active { border: 1px solid #90caf9; }
.pokemon-card.fainted { opacity: 0.4; }
.pokemon-card.boss { border: 1px solid #ffd700; }
.pokemon-name { font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hp-bar { height: 4px; background: #334; border-radius: 2px; margin-bottom: 3px; }
.hp-fill { height: 100%; border-radius: 2px; background: #4caf50; transition: width 0.3s; }
.hp-fill.low { background: #ff9800; }
.hp-fill.critical { background: #f44336; }
.stat-row { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 2px; }
.tag { border-radius: 3px; padding: 1px 4px; font-size: 0.68rem; }
.tag-energy { background: #1a3a5c; color: #90caf9; }
.tag-dot { background: #3a1a1a; color: #f88; }
.tag-buff { background: #1a3a1a; color: #a5d6a7; }
.tag-debuff { background: #3a1a3a; color: #ce93d8; }
.tag-mark { background: #2a2a1a; color: #fff176; }
.tag-boss { background: #3a2a00; color: #ffd700; }

/* 变化列表 */
.changes-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
.change-item { background: #16213e; border-radius: 4px; padding: 6px 8px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
.change-item button { background: #5c1a1a; border: none; color: #f88; border-radius: 3px; padding: 1px 6px; cursor: pointer; font-size: 0.75rem; }

/* 变化表单 */
.form-card { background: #0a2040; border-radius: 6px; padding: 10px; margin-top: 8px; }
.form-section { background: #0f3460; border-radius: 5px; padding: 8px; margin-bottom: 6px; }
.form-section-title { font-size: 0.72rem; color: #90caf9; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.field-grid { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.field-box { display: flex; flex-direction: column; gap: 2px; }
.field-box label { font-size: 0.7rem; color: #aaa; }
.field-box input[type=number], .field-box input[type=text] { width: 70px; }
.field-box input[type=checkbox] { width: 16px; height: 16px; accent-color: #90caf9; margin-top: 4px; }
.field-box select { width: 110px; }
.field-box.wide input { width: 130px; }
.hp-pair { display: flex; gap: 4px; align-items: center; }
.hp-pair span { color: #aaa; font-size: 0.8rem; }

/* 按钮 */
button.primary { background: #0d47a1; color: #fff; border: none; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 0.82rem; }
button.primary:hover { background: #1565c0; }
button.success { background: #1b5e20; color: #fff; border: none; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 0.82rem; }
button.success:hover { background: #2e7d32; }
button.warn { background: #e65100; color: #fff; border: none; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 0.82rem; }
select, input[type=text], input[type=number] {
  background: #1a1a2e; color: #e0e0e0; border: 1px solid #334;
  border-radius: 4px; padding: 3px 6px; font-size: 0.82rem;
}

/* 历史 */
.turn-history { max-height: 200px; overflow-y: auto; }
.turn-item { border-bottom: 1px solid #223; padding: 5px 0; font-size: 0.8rem; }
.turn-label { color: #90caf9; font-weight: bold; margin-right: 8px; }
.change-summary { color: #aaa; }
.action-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.turn-num { font-size: 1rem; color: #a0c4ff; font-weight: bold; }
.setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.team-inputs { display: flex; flex-direction: column; gap: 4px; }
.team-inputs input { width: 100%; }
</style>
</head>
<body>
<h1>对战回放记录</h1>

<!-- 队伍设置 -->
<section id="setup-section">
  <h2>队伍设置</h2>
  <div class="setup-grid">
    <div>
      <div style="margin-bottom:6px;color:#a5d6a7;font-size:0.82rem">我方队伍（6只）</div>
      <div class="team-inputs" id="my-team-inputs"></div>
    </div>
    <div>
      <div style="margin-bottom:6px;color:#f48fb1;font-size:0.82rem">敌方队伍（6只）</div>
      <div class="team-inputs" id="enemy-team-inputs"></div>
    </div>
  </div>
  <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
    <input type="text" id="replay-id" placeholder="回放ID（如 r001）" style="width:160px">
    <button class="primary" onclick="startReplay()">开始记录</button>
    <button class="primary" onclick="loadFromStorage()">恢复上次</button>
  </div>
</section>

<!-- 状态面板 -->
<section id="state-section" style="display:none">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div>
      <h2 style="color:#a5d6a7">我方</h2>
      <div class="team-grid" id="my-team-display"></div>
    </div>
    <div>
      <h2 style="color:#f48fb1">敌方</h2>
      <div class="team-grid" id="enemy-team-display"></div>
    </div>
  </div>
</section>

<!-- 回合输入 -->
<section id="input-section" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h2>回合输入</h2>
    <span class="turn-num" id="turn-label">第 1 回合</span>
  </div>
  <div class="changes-list" id="changes-list"></div>
  <button class="primary" onclick="openChangeForm()">+ 添加变化</button>

  <div id="change-form" class="form-card" style="display:none">
    <!-- 精灵选择 -->
    <div class="form-section">
      <div class="form-section-title">精灵</div>
      <div class="field-grid">
        <div class="field-box">
          <label>方</label>
          <select id="f-side" onchange="updatePokemonSelect()">
            <option value="my">我方</option>
            <option value="enemy">敌方</option>
          </select>
        </div>
        <div class="field-box">
          <label>精灵</label>
          <select id="f-pokemon"></select>
        </div>
        <div class="field-box">
          <label>换入</label>
          <input type="checkbox" id="f-entered">
        </div>
        <div class="field-box">
          <label>换出</label>
          <input type="checkbox" id="f-exited">
        </div>
        <div class="field-box">
          <label>首领化</label>
          <input type="checkbox" id="f-boss">
        </div>
      </div>
    </div>

    <!-- 技能与血量 -->
    <div class="form-section">
      <div class="form-section-title">技能与血量</div>
      <div class="field-grid">
        <div class="field-box wide">
          <label>使用技能</label>
          <input type="text" id="f-skill" placeholder="技能名（可空）">
        </div>
        <div class="field-box" id="hp-my-box">
          <label>当前血量</label>
          <div class="hp-pair">
            <input type="number" id="f-hp-cur" placeholder="当前" min="0" style="width:60px">
            <span>/</span>
            <input type="number" id="f-hp-max" placeholder="上限" min="1" style="width:60px">
          </div>
        </div>
        <div class="field-box" id="hp-enemy-box" style="display:none">
          <label>血量%（回合后）</label>
          <input type="number" id="f-hp-pct" placeholder="0-100" min="0" max="100" style="width:70px">
        </div>
        <div class="field-box">
          <label>能量Δ</label>
          <input type="number" id="f-energy" placeholder="±" style="width:60px">
        </div>
      </div>
    </div>

    <!-- 伤害 -->
    <div class="form-section">
      <div class="form-section-title">受到的伤害</div>
      <div class="field-grid">
        <div class="field-box">
          <label>直接伤害</label>
          <input type="number" id="f-dmg-direct" placeholder="数值" min="0">
        </div>
        <div class="field-box">
          <label>DoT 伤害</label>
          <input type="number" id="f-dmg-dot" placeholder="数值" min="0">
        </div>
        <div class="field-box">
          <label>被击杀</label>
          <input type="checkbox" id="f-fainted">
        </div>
      </div>
    </div>

    <!-- DoT 层数 -->
    <div class="form-section">
      <div class="form-section-title">DoT 层数变化</div>
      <div class="field-grid">
        <div class="field-box"><label>毒Δ</label><input type="number" id="f-poison" placeholder="±" style="width:55px"></div>
        <div class="field-box"><label>灼烧Δ</label><input type="number" id="f-burn" placeholder="±" style="width:55px"></div>
        <div class="field-box"><label>冻结Δ</label><input type="number" id="f-freeze" placeholder="±" style="width:55px"></div>
      </div>
    </div>

    <!-- Buff -->
    <div class="form-section">
      <div class="form-section-title">Buff / Debuff 变化</div>
      <div class="field-grid">
        <div class="field-box"><label>物攻Δ</label><input type="number" id="f-atk" placeholder="±" style="width:50px"></div>
        <div class="field-box"><label>魔攻Δ</label><input type="number" id="f-satk" placeholder="±" style="width:50px"></div>
        <div class="field-box"><label>物防Δ</label><input type="number" id="f-def" placeholder="±" style="width:50px"></div>
        <div class="field-box"><label>魔防Δ</label><input type="number" id="f-sdef" placeholder="±" style="width:50px"></div>
        <div class="field-box"><label>速度Δ</label><input type="number" id="f-spd" placeholder="±" style="width:50px"></div>
        <div class="field-box"><label>连击Δ</label><input type="number" id="f-hit" placeholder="±" style="width:50px"></div>
        <div class="field-box"><label>威力Δ</label><input type="number" id="f-pow" placeholder="±" style="width:50px"></div>
      </div>
    </div>

    <!-- 印记 -->
    <div class="form-section">
      <div class="form-section-title">印记变化</div>
      <div class="field-grid">
        <div class="field-box wide"><label>新增印记（逗号分隔）</label><input type="text" id="f-marks-add" placeholder="风起印记,光合印记"></div>
        <div class="field-box wide"><label>移除印记（逗号分隔）</label><input type="text" id="f-marks-rm" placeholder=""></div>
      </div>
    </div>

    <!-- 永久效果 -->
    <div class="form-section">
      <div class="form-section-title">永久效果（萌化/特性提升等，换出不消失）</div>
      <div class="field-grid">
        <div class="field-box"><label>物攻Δ%</label><input type="number" id="f-pe-atk" placeholder="±%" style="width:55px"></div>
        <div class="field-box"><label>魔攻Δ%</label><input type="number" id="f-pe-satk" placeholder="±%" style="width:55px"></div>
        <div class="field-box"><label>物防Δ%</label><input type="number" id="f-pe-def" placeholder="±%" style="width:55px"></div>
        <div class="field-box"><label>魔防Δ%</label><input type="number" id="f-pe-sdef" placeholder="±%" style="width:55px"></div>
        <div class="field-box"><label>速度Δ</label><input type="number" id="f-pe-spd" placeholder="±" style="width:55px"></div>
        <div class="field-box"><label>威力Δ</label><input type="number" id="f-pe-pow" placeholder="±" style="width:55px"></div>
        <div class="field-box"><label>连击Δ</label><input type="number" id="f-pe-hit" placeholder="±" style="width:55px"></div>
        <div class="field-box"><label>萌化Δ</label><input type="number" id="f-pe-moe" placeholder="±" style="width:55px"></div>
      </div>
    </div>

    <div style="display:flex;gap:6px;margin-top:6px">
      <button class="primary" onclick="addChange()">确认</button>
      <button class="warn" onclick="cancelChange()">取消</button>
    </div>
  </div>
</section>

<!-- 操作栏 -->
<section id="action-section" style="display:none">
  <div class="action-bar">
    <button class="success" onclick="submitTurn()">提交本回合</button>
    <button class="primary" onclick="undoTurn()">撤销上回合</button>
    <button class="primary" onclick="exportJSON()">导出 JSON</button>
    <button class="warn" onclick="resetAll()">重置</button>
  </div>
</section>

<!-- 历史 -->
<section id="history-section" style="display:none">
  <h2>回合历史</h2>
  <div class="turn-history" id="turn-history"></div>
</section>

<script src="app.js?v=2"></script>
</body>
</html>
